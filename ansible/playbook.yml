---
- name: Deploy node app on EC2
  hosts: all
  become: yes
  vars:
    app_name: node
    app_dir: /opt/app
    app_port: 3000
    node_env_database_url: ""
    node_env_mongo_uri: ""
    node_env_db_host: ""
    node_env_db_port: ""
    node_env_db_name: ""
    node_env_db_user: ""
    node_env_db_password: ""
    install_db: ""
    db_type: ""
    db_name: ""
    db_username: ""
    db_password: ""

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded

    - name: restart nginx
      service:
        name: nginx
        state: restarted

  tasks:
    # ── Local DB install (PostgreSQL) ────────────────────────────────────────
    - name: Install PostgreSQL
      when: install_db | string | lower == 'true' and db_type | lower == 'postgresql'
      block:
        - name: Install PostgreSQL packages
          apt:
            name:
              - postgresql
              - postgresql-contrib
              - python3-psycopg2
            state: present
            update_cache: yes

        - name: Ensure PostgreSQL is started and enabled
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: Set pg_hba to md5 auth
          shell: |
            PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
            sed -i "s/^local\s\+all\s\+all\s\+peer/local all all md5/" "$PG_HBA"
            sed -i "s/^host\s\+all\s\+all\s\+127\.0\.0\.1\/32\s\+ident/host all all 127.0.0.1\/32 md5/" "$PG_HBA"
            systemctl reload postgresql
          args:
            executable: /bin/bash

        - name: Create PostgreSQL database and user
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER \"{{ db_username }}\" WITH PASSWORD '{{ db_password }}';"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE \"{{ db_name }}\" OWNER \"{{ db_username }}\";"
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"{{ db_name }}\" TO \"{{ db_username }}\";"
          args:
            executable: /bin/bash

    # ── Local DB install (MySQL) ─────────────────────────────────────────────
    - name: Install MySQL
      when: install_db | string | lower == 'true' and db_type | lower == 'mysql'
      block:
        - name: Install MySQL packages
          apt:
            name:
              - mysql-server
              - python3-mysqldb
            state: present
            update_cache: yes

        - name: Ensure MySQL is started and enabled
          service:
            name: mysql
            state: started
            enabled: yes

        - name: Create MySQL database and user
          shell: |
            mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`{{ db_name }}\`;"
            mysql -u root -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
            mysql -u root -e "GRANT ALL PRIVILEGES ON \`{{ db_name }}\`.* TO '{{ db_username }}'@'localhost';"
            mysql -u root -e "FLUSH PRIVILEGES;"
          args:
            executable: /bin/bash

    # ── Local DB install (MongoDB) ───────────────────────────────────────────
    - name: Install MongoDB
      when: install_db | string | lower == 'true' and db_type | lower == 'mongodb'
      block:
        - name: Add MongoDB apt key
          shell: |
            curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
              gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
          args:
            creates: /usr/share/keyrings/mongodb-server-7.0.gpg

        - name: Add MongoDB apt repository
          copy:
            content: |
              deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse
            dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
            mode: "0644"

        - name: Install MongoDB
          apt:
            name: mongodb-org
            state: present
            update_cache: yes

        - name: Ensure MongoDB is started and enabled
          service:
            name: mongod
            state: started
            enabled: yes

        - name: Create MongoDB database and user
          shell: |
            mongosh --quiet --eval "
              db = db.getSiblingDB('{{ db_name }}');
              if (db.getUsers().users.filter(u => u.user === '{{ db_username }}').length === 0) {
                db.createUser({
                  user: '{{ db_username }}',
                  pwd: '{{ db_password }}',
                  roles: [{ role: 'readWrite', db: '{{ db_name }}' }]
                });
              }
            "
          args:
            executable: /bin/bash

    # ── System packages ──────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - curl
          - git
          - nginx
        state: present

    # ── Node.js ──────────────────────────────────────────────────────────────
    - name: Install Node.js 20.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    # ── App directory ────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    # ── Pull app from GitHub ─────────────────────────────────────────────────
    - name: Pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: ubuntu

    # ── Write .env file ──────────────────────────────────────────────────────
    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
        content: |
          {% if node_env_database_url | length > 0 %}
          DATABASE_URL={{ node_env_database_url }}
          {% endif %}
          {% if node_env_mongo_uri | length > 0 %}
          MONGO_URI={{ node_env_mongo_uri }}
          {% endif %}
          {% if node_env_db_host | length > 0 %}
          DB_HOST={{ node_env_db_host }}
          {% endif %}
          {% if node_env_db_port | length > 0 %}
          DB_PORT={{ node_env_db_port }}
          {% endif %}
          {% if node_env_db_name | length > 0 %}
          DB_NAME={{ node_env_db_name }}
          {% endif %}
          {% if node_env_db_user | length > 0 %}
          DB_USER={{ node_env_db_user }}
          {% endif %}
          {% if node_env_db_password | length > 0 %}
          DB_PASSWORD={{ node_env_db_password }}
          {% endif %}
          PORT={{ app_port }}
          HOST=0.0.0.0

    # ── npm install ──────────────────────────────────────────────────────────
    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
      become: yes
      become_user: ubuntu

    # ── Start app with PM2 ───────────────────────────────────────────────────
    - name: Start app with PM2
      shell: |
        export HOME=/home/ubuntu
        cd {{ app_dir }}
        pm2 delete {{ app_name }} 2>/dev/null || true
        if [ -f "{{ app_dir }}/package.json" ] && grep -q '"start"' "{{ app_dir }}/package.json"; then
          pm2 start npm --name {{ app_name }} -- start
        elif [ -f "{{ app_dir }}/server.js" ]; then
          pm2 start "{{ app_dir }}/server.js" --name {{ app_name }}
        elif [ -f "{{ app_dir }}/index.js" ]; then
          pm2 start "{{ app_dir }}/index.js" --name {{ app_name }}
        elif [ -f "{{ app_dir }}/app.js" ]; then
          pm2 start "{{ app_dir }}/app.js" --name {{ app_name }}
        else
          echo "No Node.js entrypoint found in {{ app_dir }}" >&2
          exit 1
        fi
        pm2 save
        pm2 startup systemd -u ubuntu --hp /home/ubuntu | tail -1 | bash || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu

    # ── nginx config ─────────────────────────────────────────────────────────
    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-enabled/app
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_cache_bypass $http_upgrade;
              }
          }
      notify: restart nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Flush handlers to apply nginx config
      meta: flush_handlers

    # ── Verify app is running ────────────────────────────────────────────────
    - name: Wait for app to be ready on port 3000
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 120
        delay: 10
      register: app_wait
      ignore_errors: yes

    - name: Print PM2 logs if app failed to start
      shell: |
        export HOME=/home/ubuntu
        pm2 logs --lines 100 {{ app_name }} --nostream || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      when: app_wait is failed

    - name: Print .env file for debugging
      shell: cat {{ app_dir }}/.env || true
      args:
        executable: /bin/bash
      when: app_wait is failed

    - name: Print node and npm versions
      shell: node --version && npm --version || true
      args:
        executable: /bin/bash
      when: app_wait is failed

    - name: Try running app directly to capture error
      shell: |
        export HOME=/home/ubuntu
        cd {{ app_dir }}
        set -a; [ -f .env ] && . ./.env; set +a
        timeout 10 node server.js 2>&1 || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      register: direct_run
      ignore_errors: yes

    - name: Show direct run output
      debug:
        msg: "{{ direct_run.stdout_lines | default([]) + direct_run.stderr_lines | default([]) }}"
      when: app_wait is failed and direct_run is defined

    - name: Fail if app did not start
      fail:
        msg: "App failed to start on port {{ app_port }}. Check PM2 logs above."
      when: app_wait is failed

    - name: Print server IP
      debug:
        msg: "server_ip={{ ansible_host }}"